<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insights - ACADEXA</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/insights.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>ACADEXA</span>
        </div>
        <nav>
            <a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="planner.html"><i class="fa-solid fa-list-check"></i> Planner</a>
            <a href="analytics.html"><i class="fa-solid fa-chart-line"></i> Analytics</a>
            <a class="active" href="insights.html"><i class="fa-solid fa-robot"></i> Insights</a>
            <a href="profile.html"><i class="fa-solid fa-user"></i> Profile</a>
            <a href="#" onclick="handleLogout(event)" class="logout-btn" style="color: #EF4444; margin-top: 20px;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <h1>🤖 Academic Insights</h1>
        <p>AI-style recommendations based on your academic activities.</p>
        <br>
        <div class="insight-grid">
            <div class="insight-card">
                <h3>Productivity Score</h3>
                <h1 id="productivityScore">0%</h1>
            </div>
            <div class="insight-card">
                <h3>Academic Health</h3>
                <h1 id="healthStatus">Good</h1>
            </div>
        </div>
        <br>
        <div class="recommendation-card">
            <h2>Recommendations</h2>
            <div id="recommendations"></div>
        </div>
    </main>
</div>

<!-- TOMBOL MENU MOBILE (ANTI MACET) -->
<button class="mobile-menu" onclick="document.querySelector('.sidebar').classList.toggle('active')">
    <i class="fa-solid fa-bars"></i>
</button>

<script src="../js/auth.js"></script>
<script src="../js/insights.js"></script>
</body>
</html>
