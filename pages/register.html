<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ACADEXA</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Menggunakan style yang sama dengan login */
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #F8FAFC; padding: 40px 20px; }
        .auth-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 460px; text-align: center; }
        .auth-card .logo { justify-content: center; margin-bottom: 24px; color: #2563EB; }
        .auth-card h2 { margin-bottom: 8px; font-weight: 700; }
        .auth-card p { color: #64748B; margin-bottom: 24px; font-size: 14px; }
        .input-group { text-align: left; margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 600; }
        .input-group input { width: 100%; padding: 12px 16px; border: 1px solid #CBD5E1; border-radius: 12px; outline: none; font-size: 15px; }
        .input-group input:focus { border-color: #2563EB; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .auth-btn { width: 100%; margin-top: 12px; padding: 14px; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="logo">
            <i class="fa-solid fa-graduation-cap"></i>
            <span>ACADEXA</span>
        </div>
        <h2>Create Account</h2>
        <p>Start your customized academic journey</p>

        <form id="registerForm" onsubmit="event.preventDefault(); handleRegister();">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Ahmad Rizky" required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="youremail@example.com" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="••••••••" required>
            </div>
            <div class="input-group">
                <label>Major / Study Program</label>
                <input type="text" id="regMajor" placeholder="Sistem Informasi" required>
            </div>
            <div class="grid-2">
                <div class="input-group">
                    <label>Current Semester</label>
                    <input type="number" id="regSemester" placeholder="6" min="1" max="14" required>
                </div>
                <div class="input-group">
                    <label>Current GPA</label>
                    <input type="number" id="regGPA" placeholder="3.62" step="0.01" min="0" max="4" required>
                </div>
            </div>
            <button type="submit" class="btn-primary auth-btn">Register Account</button>
        </form>

        <p style="margin-top: 24px; margin-bottom: 0;"> Already have an account? <a href="login.html" style="color: #2563EB; text-decoration: none; font-weight: 600;">Login</a></p>
    </div>
</div>

<script src="../js/auth.js"></script>
</body>
</html>
